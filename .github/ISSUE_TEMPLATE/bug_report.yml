name: Bug Report
description: Something broke or doesn't work as expected
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: channel
    attributes:
      label: Which channel?
      options:
        - Telegram
        - WhatsApp
        - Discord
        - Slack
        - WebChat
        - CLI
        - Core (not channel-specific)
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: How bad is it?
      options:
        - Crash / data loss
        - Feature completely broken
        - Works but wrong behavior
        - Cosmetic / minor
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: "I sent a message on Telegram and..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: "The bot should have..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start gateway with `iris start`
        2. Send "/help" on Telegram
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - iris-gateway version:
        - Node.js version:
        - OS:
        - AI model provider:
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (if any)
      render: shell
    validations:
      required: false
