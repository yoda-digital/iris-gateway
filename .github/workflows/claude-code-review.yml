name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          prompt: |
            Review this PR thoroughly. Check:
            1. Correctness — logic errors, edge cases, race conditions
            2. Test coverage — are new behaviors tested? are tests meaningful?
            3. Architecture — alignment with VISION.md and CLAUDE.md conventions
            4. TypeScript type safety — no as any, proper types
            5. Model constraints — NO Anthropic/paid model hardcoding (BLOCKER if found)
            6. Code quality — naming, DRY, error handling, file size (<500 lines)

            Final line MUST be exactly one of:
            **Verdict: MERGEABLE**
            **Verdict: NEEDS CHANGES** followed by numbered list
            **Verdict: NOT MERGEABLE** followed by reasons
