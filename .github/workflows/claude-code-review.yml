name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "anastasia-istrati[bot]"
          prompt: |
            Review this PR thoroughly. Check:
            1. Correctness — logic errors, edge cases, race conditions
            2. Test coverage — are new behaviors tested? are tests meaningful?
            3. Architecture — alignment with VISION.md and CLAUDE.md conventions
            4. TypeScript type safety — no as any, proper types
            5. Model constraints — NO Anthropic/paid model hardcoding (BLOCKER if found)
            6. Code quality — naming, DRY, error handling, file size (<500 lines)

            Final line MUST be exactly one of:
            **Verdict: MERGEABLE**
            **Verdict: NEEDS CHANGES** followed by numbered list
            **Verdict: NOT MERGEABLE** followed by reasons

      - name: Apply verdict label
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch the most recent review comment from anastasia-istrati[bot]
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
              per_page: 100
            });
            const botComments = comments.filter(c => c.user.login === 'anastasia-istrati[bot]');
            if (!botComments.length) {
              core.info('No bot review comment found, skipping label apply.');
              return;
            }
            const latestComment = botComments[botComments.length - 1];
            const body = latestComment.body || '';

            // Parse verdict from the final bold verdict line
            let verdict = null;
            if (/\*\*Verdict:\s*NEEDS CHANGES\*\*/i.test(body)) verdict = 'NEEDS CHANGES';
            else if (/\*\*Verdict:\s*NOT MERGEABLE\*\*/i.test(body)) verdict = 'NOT MERGEABLE';
            else if (/\*\*Verdict:\s*MERGEABLE\*\*/i.test(body)) verdict = 'MERGEABLE';

            if (!verdict) {
              core.info('No verdict found in latest review comment.');
              return;
            }
            core.info(`Verdict detected: ${verdict}`);

            // Ensure labels exist, create if missing
            const labelMap = {
              'NEEDS CHANGES': { name: 'needs-changes-loop', color: 'e4e669', description: 'Needs changes before merge' },
              'NOT MERGEABLE': { name: 'blocked', color: 'd73a4a', description: 'Blocked from merging' },
              'MERGEABLE': { name: 'mergeable', color: '0e8a16', description: 'Approved and ready to merge' }
            };
            const labelInfo = labelMap[verdict];

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelInfo.name });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner, repo, name: labelInfo.name, color: labelInfo.color, description: labelInfo.description });
                core.info(`Created label: ${labelInfo.name}`);
              }
            }

            // Remove conflicting labels
            const conflictingLabels = ['needs-changes-loop', 'blocked', 'mergeable'].filter(l => l !== labelInfo.name);
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNumber });
            for (const lbl of currentLabels) {
              if (conflictingLabels.includes(lbl.name)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: lbl.name });
              }
            }

            // Apply the verdict label
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [labelInfo.name] });
            core.info(`Applied label: ${labelInfo.name}`);

            // For NOT MERGEABLE, add a comment notifying PR author
            if (verdict === 'NOT MERGEABLE') {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `@${pr.user.login} — This PR has been marked **NOT MERGEABLE** by the automated Claude review. Please address the blockers in the review comment before requesting a re-review.`
              });
            }
