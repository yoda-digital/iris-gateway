name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, converted_to_draft]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark PR as awaiting-review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isDraft = context.payload.pull_request.draft;
            const event = context.payload.action;

            // Remove awaiting-review if PR was converted to draft
            if (event === 'converted_to_draft') {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'awaiting-review' });
                core.info('Removed awaiting-review (PR converted to draft)');
              } catch (e) {
                if (e.status !== 404) core.warning(`Failed to remove awaiting-review: ${e.message}`);
              }
              return;
            }

            // Skip draft PRs — no review until ready
            if (isDraft) {
              core.info('PR is draft — skipping awaiting-review');
              return;
            }

            // Ensure label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'awaiting-review' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner, repo, name: 'awaiting-review', color: '0075ca', description: 'Awaiting code review' });
                core.info('Created awaiting-review label');
              } else {
                throw e;
              }
            }

            // Remove stale verdict labels — a new push invalidates the previous review
            const staleLabels = ['mergeable', 'needs-changes-loop', 'blocked'];
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNumber });
            for (const lbl of currentLabels) {
              if (staleLabels.includes(lbl.name)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: lbl.name });
                core.info(`Removed stale label: ${lbl.name}`);
              }
            }

            // Apply awaiting-review to signal review is in progress
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['awaiting-review'] });
            core.info('Applied awaiting-review label');

      - name: Run Claude Code Review
        id: claude-review
        if: github.event.action != 'converted_to_draft' && !github.event.pull_request.draft
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "anastasia-istrati[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR thoroughly. Check:
            1. Correctness — logic errors, edge cases, race conditions
            2. Test coverage — are new behaviors tested? are tests meaningful?
            3. Architecture — alignment with VISION.md and CLAUDE.md conventions
            4. TypeScript type safety — no as any, proper types
            5. Model constraints — NO Anthropic/paid model hardcoding (BLOCKER if found)
            6. Code quality — naming, DRY, error handling, file size (<500 lines)

            Final line MUST be exactly one of:
            **Verdict: MERGEABLE**
            **Verdict: NEEDS CHANGES** followed by numbered list
            **Verdict: NOT MERGEABLE** followed by reasons

            Post your review using `gh pr comment` to add a top-level comment with your verdict and findings.
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep"

      - name: Apply verdict label
        if: steps.claude-review.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fetch ALL review comments from github-actions[bot] or anastasia-istrati[bot] (paginated)
            const allComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber
            });
            const botComments = allComments.filter(c =>
              (c.user.login === 'github-actions[bot]' || c.user.login === 'anastasia-istrati[bot]') &&
              !c.body.startsWith('@claude') &&
              !c.body.includes('Review checklist:') &&
              !c.body.includes('canonical branch HEAD')
            );
            if (!botComments.length) {
              core.info('No bot review comment found, skipping label apply.');
              return;
            }
            const latestComment = botComments[botComments.length - 1];
            const body = latestComment.body || '';

            // Parse verdict from the final bold verdict line
            let verdict = null;
            if (/\*\*Verdict:\s*NEEDS CHANGES\*\*/i.test(body)) verdict = 'NEEDS CHANGES';
            else if (/\*\*Verdict:\s*NOT MERGEABLE\*\*/i.test(body)) verdict = 'NOT MERGEABLE';
            else if (/\*\*Verdict:\s*MERGEABLE\*\*/i.test(body)) verdict = 'MERGEABLE';

            if (!verdict) {
              core.info('No verdict found in latest review comment.');
              return;
            }
            core.info(`Verdict detected: ${verdict}`);

            // Ensure verdict label exists, create if missing
            const labelMap = {
              'NEEDS CHANGES': { name: 'needs-changes-loop', color: 'e4e669', description: 'Needs changes before merge' },
              'NOT MERGEABLE': { name: 'blocked', color: 'd73a4a', description: 'Blocked from merging' },
              'MERGEABLE': { name: 'mergeable', color: '0e8a16', description: 'Approved and ready to merge' }
            };
            const labelInfo = labelMap[verdict];

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelInfo.name });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner, repo, name: labelInfo.name, color: labelInfo.color, description: labelInfo.description });
                core.info(`Created label: ${labelInfo.name}`);
              } else {
                throw e;
              }
            }

            // Remove conflicting labels — review is complete, awaiting-review can go
            const conflictingLabels = ['needs-changes-loop', 'blocked', 'mergeable', 'awaiting-review'].filter(l => l !== labelInfo.name);
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNumber });
            for (const lbl of currentLabels) {
              if (conflictingLabels.includes(lbl.name)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: lbl.name });
                core.info(`Removed label: ${lbl.name}`);
              }
            }

            // Apply the verdict label
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [labelInfo.name] });
            core.info(`Applied label: ${labelInfo.name}`);

            // CRITICAL FIX: When verdict is NEEDS CHANGES, dispatch claude.yml via workflow_dispatch
            // instead of relying on the pull_request labeled event, which GitHub does NOT fire
            // when labels are added by GITHUB_TOKEN (to prevent infinite loops).
            // workflow_dispatch bypasses this restriction and reliably triggers the fix workflow.
            if (verdict === 'NEEDS CHANGES') {
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'claude.yml',
                ref: 'main',
                inputs: {
                  pr_number: String(prNumber),
                  branch: pr.head.ref,
                },
              });
              core.info(`Dispatched claude.yml workflow_dispatch for PR #${prNumber} (branch: ${pr.head.ref})`);
            }

            // For NOT MERGEABLE, notify PR author (dedup: skip if already posted)
            if (verdict === 'NOT MERGEABLE') {
              const alreadyNotified = allComments.some(c =>
                c.body && c.body.includes('has been marked **NOT MERGEABLE**')
              );
              if (!alreadyNotified) {
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: `@${pr.user.login} — This PR has been marked **NOT MERGEABLE** by the automated Claude review. Please address the blockers in the review comment before requesting a re-review.`
                });
              }
            }
