name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [labeled]
  # workflow_dispatch allows claude-code-review.yml to trigger this workflow directly
  # using GITHUB_TOKEN — bypassing the GitHub limitation that prevents pull_request
  # labeled events from re-triggering workflows when the label was added by GITHUB_TOKEN.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix (needs-changes-loop trigger)'
        required: true
        type: string
      branch:
        description: 'Branch name for the PR'
        required: true
        type: string

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'pull_request' && github.event.label.name == 'needs-changes-loop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git credentials
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Copy repo settings to runner home
        run: |
          mkdir -p ~/.claude
          if [ -f .claude/settings.json ]; then
            cp .claude/settings.json ~/.claude/settings.json
            echo "Copied .claude/settings.json to runner home"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "anastasia-istrati[bot]"
          additional_permissions: |
            actions: read
          prompt: |
            ${{ (github.event_name == 'pull_request' && github.event.label.name == 'needs-changes-loop') && format('A "needs-changes-loop" label was added to PR #{0}. Read the latest Claude review comment on this PR, implement ALL requested fixes directly using bash/edit tools, commit with a descriptive message, and push to the branch. Use git push origin HEAD. After pushing, post a summary comment of what was fixed.', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch') && format('A "needs-changes-loop" label was added to PR #{0}. Read the latest Claude review comment on this PR, implement ALL requested fixes directly using bash/edit tools, commit with a descriptive message, and push to the branch. Use git push origin HEAD:{1}. After pushing, post a summary comment of what was fixed.', github.event.inputs.pr_number, github.event.inputs.branch) || '' }}
