# Iris Gateway — Docker Compose
#
# Zero-friction deployment:
#   cp iris.config.example.json iris.config.json   # edit your tokens/channels
#   echo "TELEGRAM_BOT_TOKEN=xxx" > .env
#   docker-compose up -d
#
# State is persisted in the 'iris-state' named volume at /home/iris/.iris
# (vault.db, sessions, plugin data, config overrides)

services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile

    # Port mapping: host:container
    #   19876 — health check + REST API (required)
    #   19877 — internal tool server (only needed if external OpenCode)
    #   19878 — media server (only needed if sending images/audio)
    ports:
      - "19876:19876"
      - "19877:19877"
      - "19878:19878"

    # Load bot tokens and API keys from .env file
    # Required: at least one of TELEGRAM_BOT_TOKEN / DISCORD_BOT_TOKEN / SLACK_*
    # Optional: OPENROUTER_API_KEY if not using free-tier anonymous access
    env_file:
      - .env

    # Inline env overrides (useful for CI/CD or k8s secrets)
    # environment:
    #   - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    #   - LOG_LEVEL=info

    # Restart on crash, but not on clean shutdown (docker-compose down)
    restart: unless-stopped

    volumes:
      # Persistent state: SQLite vault, sessions, plugin data
      - iris-state:/home/iris/.iris
      # Mount your config file (edit locally, Iris reads on startup)
      - ./iris.config.json:/app/iris.config.json:ro

    healthcheck:
      # Hit the /health endpoint — returns 200 when gateway is up
      test: ["CMD", "curl", "-sf", "http://localhost:19876/health"]
      interval: 30s      # check every 30s
      timeout: 10s       # fail if no response within 10s
      retries: 3         # mark unhealthy after 3 consecutive failures
      start_period: 20s  # give it 20s to start before checking

    # Optional: resource limits to prevent runaway memory usage
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: "0.5"

volumes:
  # Named volume — survives container restarts and rebuilds
  # To back up: docker run --rm -v iris-state:/data -v $(pwd):/backup alpine tar czf /backup/iris-state.tar.gz /data
  iris-state:
